<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SABA v13.9 - FULL BACKUP</title>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --green: #188038; --dark: #202124; }
        body { font-family: -apple-system, sans-serif; background: #f1f3f4; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 12px; border-top: 6px solid var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .toolbar { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-tool { cursor: pointer; border: 1px solid #dadce0; border-radius: 6px; padding: 10px; font-weight: bold; font-size: 10px; background: white; flex: 1; }
        .card { border: 1px solid #dadce0; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        h3 { color: var(--blue); margin: 0 0 8px 0; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #eee; }
        textarea { width: 100%; height: 70px; border: 1px solid #bdc1c6; border-radius: 6px; padding: 8px; font-size: 14px; box-sizing: border-box; resize: none; background: #fff; }
        .h-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #bdc1c6; border-radius: 6px; text-align: center; font-weight: bold; font-size: 16px; box-sizing: border-box; }
        .btn-exec { background: var(--blue); color: white; width: 100%; padding: 16px; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #1557b0; }
        .panel { background: #e8f5e9; border: 2px solid var(--green); padding: 10px; border-radius: 8px; margin-top: 15px; display: none; }
        .t-item { background: white; border: 1px solid var(--green); padding: 12px; border-radius: 6px; text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
    </style>
</head>
<body onload="carregarDB()">

<div class="container">
    <div class="toolbar">
        <button class="btn-tool" onclick="fazerBackup()">💾 EXPORTAR TUDO</button>
        <button class="btn-tool" onclick="document.getElementById('fIn').click()">📂 IMPORTAR TUDO</button>
        <input type="file" id="fIn" style="display:none" onchange="restaurarBackup(event)">
        <button class="btn-tool" style="color:var(--red)" onclick="resetarSistema()">🧨 LIMPAR</button>
    </div>

    <div class="card">
        <h3>📊 BANCO DE DADOS</h3>
        <textarea id="txtAt" placeholder="Ciclo (Atrasados)..."></textarea>
        <textarea id="txtVi" style="margin-top:5px; border-color:var(--blue)" placeholder="Dezenas Viciadas..."></textarea>
    </div>

    <div class="card">
        <h3>🕒 RESULTADOS DO DIA</h3>
        <div class="h-grid">
            <input type="number" id="h1" placeholder="COR">
            <input type="number" id="h2" placeholder="PPT">
            <input type="number" id="h3" placeholder="PTM">
            <input type="number" id="h4" placeholder="PT">
            <input type="number" id="h5" placeholder="PTV">
            <input type="number" id="h6" placeholder="PTN">
        </div>
        <input type="text" id="txtEx" style="margin-top:8px; font-size:12px;" placeholder="Dezenas para Excluir hoje">
    </div>

    <button class="btn-exec" onclick="processarGeral()">GERAR JOGOS (V13.9)</button>

    <div id="painelPalpite" class="panel">
        <h3 style="color:var(--green)">🎯 PALPITES TÉCNICOS (SEM REPETIÇÃO)</h3>
        <div id="gridPalpites"></div>
    </div>
</div>

<script>
    let db = { ciclo: [], viciadas: "" };
    const KEY = "SABA_GOLD_139";

    function carregarDB() {
        const d = localStorage.getItem(KEY);
        if(d) {
            db = JSON.parse(d);
            document.getElementById('txtAt').value = db.ciclo.join(" ");
            document.getElementById('txtVi').value = db.viciadas || "";
        }
    }

    function getG(d) {
        let n = parseInt(d);
        return (n === 0 || n === 100) ? 25 : Math.ceil(n/4);
    }

    function aplicarEspelho(d) {
        let s = d.toString().padStart(2, '0');
        let n = parseInt(s.split('').reverse().join(''));
        return n > 99 ? Math.abs(n - 50) : n;
    }

    function processarGeral() {
        // Captura e Salva no DB Local
        let at = (document.getElementById('txtAt').value.match(/\d+/g) || []).map(Number);
        if(at.length > 0) db.ciclo = [...new Set(at)];
        db.viciadas = document.getElementById('txtVi').value;

        // Processa Resultados h1-h6
        for(let i=1; i<=6; i++) {
            let v = parseInt(document.getElementById('h'+i).value);
            if(!isNaN(v)) { db.ciclo = db.ciclo.filter(x => x !== v); db.ciclo.push(v); }
            document.getElementById('h'+i).value = "";
        }

        const viRaw = [...new Set((db.viciadas.match(/\d+/g) || []).map(Number))];
        const jaSairam = (document.getElementById('txtEx').value.match(/\d+/g) || []).map(Number);
        
        let pool = viRaw.filter(d => !jaSairam.includes(d));
        let topo = db.ciclo.slice(0, 10);
        let lista = [...new Set([...pool.filter(d => topo.includes(getG(d))), ...pool])];

        let html = "";
        for(let j=0; j<4; j++) {
            if(lista.length < 3) break;
            let jogo = [];
            let gps = [];
            
            while(jogo.length < 3 && lista.length > 0) {
                let d = lista.shift();
                let g = getG(d);
                if(jogo.includes(d) || gps.includes(g)) d = aplicarEspelho(d);
                jogo.push(d);
                gps.push(getG(d));
            }
            html += `<div class="t-item">JOGO ${j+1}: ${jogo.map(n=>n.toString().padStart(2,'0')).join(' - ')}</div>`;
        }

        document.getElementById('painelPalpite').style.display = 'block';
        document.getElementById('gridPalpites').innerHTML = html;
        
        // Atualiza campos e Salva
        document.getElementById('txtAt').value = db.ciclo.join(" ");
        localStorage.setItem(KEY, JSON.stringify(db));
        alert("Dados Sincronizados e Salvos!");
    }

    function fazerBackup() {
        db.viciadas = document.getElementById('txtVi').value; // Garante que pegou o texto atual
        const b = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "BACKUP_SABA_TOTAL.json"; a.click();
    }

    function restaurarBackup(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            localStorage.setItem(KEY, JSON.stringify(db));
            alert("✅ TUDO RESTAURADO!");
            location.reload();
        };
        reader.readAsText(e.target.files[0]);
    }

    function resetarSistema() { if(confirm("Apagar tudo?")) { localStorage.removeItem(KEY); location.reload(); } }
</script>
</body>
</html>
