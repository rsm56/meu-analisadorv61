<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SABA v14.2 - GITHUB READY</title>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --green: #188038; }
        body { font-family: -apple-system, sans-serif; background: #f1f3f4; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 12px; border-top: 6px solid var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .toolbar { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-tool { cursor: pointer; border: 1px solid #dadce0; border-radius: 6px; padding: 8px; font-weight: bold; font-size: 10px; background: white; flex: 1; }
        .card { border: 1px solid #dadce0; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        textarea { width: 100%; height: 70px; border: 1px solid #bdc1c6; border-radius: 6px; padding: 8px; font-size: 14px; box-sizing: border-box; resize: none; margin-top: 5px; }
        .h-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #bdc1c6; border-radius: 6px; text-align: center; font-weight: bold; font-size: 16px; box-sizing: border-box; }
        .btn-exec { background: var(--blue); color: white; width: 100%; padding: 18px; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .panel { background: #e8f5e9; border: 2px solid var(--green); padding: 10px; border-radius: 8px; margin-top: 15px; display: none; }
        .t-item { background: white; border: 1px solid var(--green); padding: 12px; border-radius: 6px; text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
        .status-bar { font-size: 10px; color: #666; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body onload="carregarDB()">

<div class="container">
    <div class="status-bar" id="statusMemoria">Memória: Vazia</div>
    
    <div class="toolbar">
        <button class="btn-tool" onclick="fazerBackup()">💾 EXPORTAR</button>
        <button class="btn-tool" onclick="document.getElementById('fIn').click()">📂 IMPORTAR</button>
        <input type="file" id="fIn" style="display:none" onchange="restaurarBackup(event)">
        <button class="btn-tool" style="color:var(--red)" onclick="resetarSistema()">🧨 ZERAR TUDO</button>
    </div>

    <div class="card">
        <h3 style="font-size:12px; margin:0">📊 ENTRADA DE DADOS</h3>
        <textarea id="txtAt" placeholder="Novos Grupos Atrasados..."></textarea>
        <textarea id="txtVi" style="border-color:var(--blue)" placeholder="Novas Dezenas Viciadas..."></textarea>
    </div>

    <div class="card">
        <h3 style="font-size:12px; margin:0">🕒 RESULTADOS (SAÍDAS)</h3>
        <div class="h-grid" style="margin-top:5px">
            <input type="number" id="h1" placeholder="R1">
            <input type="number" id="h2" placeholder="R2">
            <input type="number" id="h3" placeholder="R3">
            <input type="number" id="h4" placeholder="R4">
            <input type="number" id="h5" placeholder="R5">
            <input type="number" id="h6" placeholder="R6">
        </div>
    </div>

    <button class="btn-exec" onclick="processarGeral()">GERAR JOGOS & SALVAR</button>

    <div id="painelPalpite" class="panel">
        <h3 style="color:var(--green); font-size:12px; margin:0 0 10px 0">🎯 PALPITES GERADOS</h3>
        <div id="gridPalpites"></div>
    </div>
</div>

<script>
    let db = { ciclo: [], viciadas: [] };
    const KEY = "SABA_V14_2_FINAL";

    function carregarDB() {
        const data = localStorage.getItem(KEY);
        if(data) {
            db = JSON.parse(data);
            atualizarStatus();
        }
    }

    function atualizarStatus() {
        document.getElementById('statusMemoria').innerText = 
            `Memória: ${db.ciclo.length} grupos / ${db.viciadas.length} viciadas salvas.`;
    }

    function getG(d) {
        let n = parseInt(d);
        return (n === 0 || n === 100) ? 25 : Math.ceil(n/4);
    }

    function aplicarEspelho(d) {
        let s = d.toString().padStart(2, '0');
        let n = parseInt(s.split('').reverse().join(''));
        return n > 99 ? Math.abs(n - 50) : n;
    }

    function processarGeral() {
        let valAt = document.getElementById('txtAt').value;
        let valVi = document.getElementById('txtVi').value;

        // 1. Atualiza se houver novos dados
        if(valAt.trim() !== "") db.ciclo = [...new Set((valAt.match(/\d+/g) || []).map(Number))];
        if(valVi.trim() !== "") db.viciadas = [...new Set((valVi.match(/\d+/g) || []).map(Number))];

        // 2. Processa Resultados
        for(let i=1; i<=6; i++) {
            let el = document.getElementById('h'+i);
            let v = parseInt(el.value);
            if(!isNaN(v)) {
                db.ciclo = db.ciclo.filter(x => x !== v);
                db.ciclo.push(v);
            }
            el.value = "";
        }

        // 3. SALVAMENTO CRÍTICO (Antes de qualquer outra coisa)
        localStorage.setItem(KEY, JSON.stringify(db));
        atualizarStatus();

        if(db.viciadas.length < 3) {
            alert("ERRO: O Banco está vazio. Importe um backup ou cole as dezenas viciadas.");
            return;
        }

        // 4. Lógica de Geração
        let topo = db.ciclo.slice(0, 10);
        let lista = [...new Set([...db.viciadas.filter(d => topo.includes(getG(d))), ...db.viciadas])];
        
        let html = "";
        let tempLista = [...lista];
        for(let j=0; j<4; j++) {
            if(tempLista.length < 3) break;
            let jogo = [];
            let gps = [];
            while(jogo.length < 3 && tempLista.length > 0) {
                let d = tempLista.shift();
                let g = getG(d);
                if(jogo.includes(d) || gps.includes(g)) d = aplicarEspelho(d);
                jogo.push(d);
                gps.push(getG(d));
            }
            html += `<div class="t-item">JOGO ${j+1}: ${jogo.map(n=>n.toString().padStart(2,'0')).join(' - ')}</div>`;
        }

        document.getElementById('painelPalpite').style.display = 'block';
        document.getElementById('gridPalpites').innerHTML = html;
        
        // 5. Limpeza de campos para nova entrada
        document.getElementById('txtAt').value = "";
        document.getElementById('txtVi').value = "";
        
        console.log("Dados persistidos com sucesso.");
    }

    function fazerBackup() {
        const b = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = "SABA_BACKUP_MESTRE.json";
        a.click();
    }

    function restaurarBackup(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                if(data.ciclo && data.viciadas) {
                    db = data;
                    localStorage.setItem(KEY, JSON.stringify(db));
                    alert("✅ BANCO RESTAURADO COM SUCESSO!");
                    location.reload();
                }
            } catch(err) { alert("Arquivo inválido."); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function resetarSistema() {
        if(confirm("ATENÇÃO: Isso apaga a memória do navegador. Tem certeza?")) {
            localStorage.removeItem(KEY);
            location.reload();
        }
    }
</script>
</body>
</html>
