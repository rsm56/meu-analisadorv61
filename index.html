<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador Pro - Inteligência de Padrões</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --success: #22c55e;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        .card h2 { font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--primary); }

        textarea {
            width: 100%;
            height: 100px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            resize: none;
            margin-bottom: 10px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        .btn-secondary { background: #64748b; margin-top: 10px; }

        .badge-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .badge {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .remove-btn { color: var(--danger); cursor: pointer; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-val { font-size: 1.5rem; font-weight: 700; display: block; }

        .alerta-forte {
            background: #fef2f2;
            border: 2px solid var(--danger);
            color: var(--danger);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Analisador Estratégico Pro</h1>
    <p>Inteligência de Padrões e Cruzamento de Dados</p>
</div>

<div class="dashboard">
    <div class="card">
        <h2>📥 Entrada de Resultados</h2>
        <textarea id="inputResultados" placeholder="Cole aqui os milhares (Ex: 1234 5678...)"></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="processarResultados('rio')">Lançar Rio</button>
            <button onclick="processarResultados('look')" style="background: #7c3aed;">Lançar Look</button>
        </div>
    </div>

    <div class="card">
        <h2>📊 Ciclo Automático</h2>
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-val" id="fechados">0</span>
                Saíram
            </div>
            <div class="stat-box">
                <span class="stat-val" id="faltam">25</span>
                Faltam
            </div>
        </div>
        <div class="badge-list" id="listaFaltantes"></div>
    </div>

    <div class="card">
        <h2>🏛️ Atrasados Rio</h2>
        <textarea id="inputAtrasadosRio" placeholder="Cole a lista de atrasados do site bicho certo..."></textarea>
        <button class="btn-secondary" onclick="importarAtrasados('rio')">Importar Rio</button>
        <div class="badge-list" id="badgesRio"></div>
    </div>

    <div class="card">
        <h2>👁️ Atrasados Look</h2>
        <textarea id="inputAtrasadosLook" placeholder="Cole a lista de atrasados da Look..."></textarea>
        <button class="btn-secondary" onclick="importarAtrasados('look')">Importar Look</button>
        <div class="badge-list" id="badgesLook"></div>
    </div>

    <div class="card">
        <h2>💡 Sugestão Estratégica</h2>
        <div id="painelSugestao">
            <p>Aguardando dados suficientes...</p>
        </div>
        <div id="alertaGrave"></div>
    </div>

    <div class="card">
        <h2>🕒 Últimos Grupos (Rio)</h2>
        <div class="badge-list" id="historicoRio"></div>
        <h2 style="margin-top:20px">🕒 Últimos Grupos (Look)</h2>
        <div class="badge-list" id="historicoLook"></div>
        <button class="btn-secondary" onclick="exportarBackup()">💾 Exportar Backup (.txt)</button>
        <button class="btn-secondary" onclick="limparTudo()" style="background:#f1f5f9; color:#ef4444; border:1px solid #ef4444">Limpar Tudo</button>
    </div>
</div>

<script>
    // Configurações e Dados
    const animais = ["Avestruz", "Águia", "Burro", "Borboleta", "Cachorro", "Cabra", "Carneiro", "Camelo", "Cobra", "Coelho", "Cavalo", "Elefante", "Galo", "Gato", "Jacaré", "Leão", "Macaco", "Porco", "Pavão", "Peru", "Touro", "Tigre", "Urso", "Veado", "Vaca"];
    
    let dados = JSON.parse(localStorage.getItem('bicho_data')) || {
        rio: [],
        look: [],
        atrasadosRio: [],
        atrasadosLook: [],
        historicoGlobal: []
    };

    function salvar() {
        localStorage.setItem('bicho_data', JSON.stringify(dados));
        atualizarInterface();
    }

    function converterParaGrupo(milhar) {
        let dezena = parseInt(milhar.toString().slice(-2));
        if (isNaN(dezena)) return null;
        let grupo = Math.ceil(dezena / 4);
        return dezena === 0 ? 25 : (grupo === 0 ? 25 : grupo);
    }

    function processarResultados(tipo) {
        const input = document.getElementById('inputResultados').value;
        const numeros = input.match(/\d{4}/g); // Pega sequências de 4 dígitos

        if (numeros) {
            numeros.slice(0, 7).forEach(m => {
                const g = converterParaGrupo(m);
                if (g) {
                    dados[tipo].unshift(g);
                    dados.historicoGlobal.push(g);
                }
            });
            document.getElementById('inputResultados').value = '';
            salvar();
        }
    }

    function importarAtrasados(tipo) {
        const input = document.getElementById(tipo === 'rio' ? 'inputAtrasadosRio' : 'inputAtrasadosLook').value;
        const grupos = input.match(/\b(0?[1-9]|1[0-9]|2[0-5])\b/g); // Pega números de 1 a 25

        if (grupos) {
            const listaUnica = [...new Set(grupos.map(Number))];
            if (tipo === 'rio') dados.atrasadosRio = listaUnica;
            else dados.atrasadosLook = listaUnica;
            
            document.getElementById(tipo === 'rio' ? 'inputAtrasadosRio' : 'inputAtrasadosLook').value = '';
            salvar();
        }
    }

    function removerItem(tipo, index) {
        dados[tipo].splice(index, 1);
        salvar();
    }

    function atualizarInterface() {
        // Atualizar Listas Visuais
        renderLista('historicoRio', dados.rio, 'rio');
        renderLista('historicoLook', dados.look, 'look');
        renderLista('badgesRio', dados.atrasadosRio, 'atrasadosRio');
        renderLista('badgesLook', dados.atrasadosLook, 'atrasadosLook');

        // Ciclo
        const unicos = [...new Set(dados.historicoGlobal)];
        const faltantes = [];
        for(let i=1; i<=25; i++) if(!unicos.includes(i)) faltantes.push(i);
        
        document.getElementById('fechados').innerText = unicos.length;
        document.getElementById('faltam').innerText = 25 - unicos.length;
        
        let htmlFaltam = '';
        faltantes.forEach(g => htmlFaltam += `<span class="badge" style="color:var(--danger)">${g} - ${animais[g-1]}</span>`);
        document.getElementById('listaFaltantes').innerHTML = htmlFaltam;

        // Sugestão e Cruzamento
        gerarSugestao(faltantes);
    }

    function renderLista(id, lista, tipo) {
        const div = document.getElementById(id);
        div.innerHTML = '';
        lista.slice(0, 15).forEach((g, index) => {
            div.innerHTML += `
                <span class="badge">
                    ${g} - ${animais[g-1]} 
                    <span class="remove-btn" onclick="removerItem('${tipo}', ${index})">×</span>
                </span>
            `;
        });
    }

    function gerarSugestao(faltantes) {
        const painel = document.getElementById('painelSugestao');
        const alerta = document.getElementById('alertaGrave');
        
        if (dados.atrasadosRio.length > 0 && dados.atrasadosLook.length > 0) {
            const rioForte = dados.atrasadosRio[0];
            const lookForte = dados.atrasadosLook[0];
            const apoio = dados.historicoGlobal[dados.historicoGlobal.length - 1] || "?";

            painel.innerHTML = `
                <div class="stat-box" style="margin-bottom:10px; border-left: 5px solid var(--primary)">
                    <strong>Entrada Sugerida:</strong><br>
                    <span style="font-size:1.2rem; font-weight:bold;">
                        ${rioForte} (${animais[rioForte-1]}) + ${lookForte} (${animais[lookForte-1]})
                    </span>
                </div>
                <p>Apoio (Último): ${apoio > 0 ? animais[apoio-1] : '---'}</p>
            `;

            // Lógica de Alerta Grave (Se o mais atrasado do Rio também falta no ciclo)
            if (faltantes.includes(rioForte)) {
                alerta.innerHTML = `<div class="alerta-forte">🚨 ALERTA: Grupo ${rioForte} (${animais[rioForte-1]}) com atraso crítico no ciclo!</div>`;
            } else {
                alerta.innerHTML = '';
            }
        }
    }

    function exportarBackup() {
        const conteudo = `BACKUP ANALISADOR\n\nRIO: ${dados.rio}\nLOOK: ${dados.look}\nHISTORICO: ${dados.historicoGlobal}`;
        const blob = new Blob([conteudo], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'backup_bicho.txt';
        a.click();
    }

    function limparTudo() {
        if(confirm("Deseja apagar todos os dados?")) {
            dados = { rio: [], look: [], atrasadosRio: [], atrasadosLook: [], historicoGlobal: [] };
            salvar();
        }
    }

    // Iniciar
    atualizarInterface();
</script>

</body>
</html>
