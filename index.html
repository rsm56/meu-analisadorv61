<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador Pro - Sistema Completo com Importador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #22c55e; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .card h2 { font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        textarea { width: 100%; height: 100px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; resize: none; margin-bottom: 10px; font-size: 14px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-secondary { background: #64748b; margin-top: 10px; }
        .badge-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .badge { background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .remove-btn { color: var(--danger); cursor: pointer; font-weight: bold; margin-left: 5px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #f8fafc; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: 700; display: block; }
        .alerta-forte { background: #fef2f2; border: 2px solid var(--danger); color: var(--danger); padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; animation: pulse 2s infinite; font-weight: bold; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="header">
    <h1>Analisador Estratégico Pro</h1>
    <p>Painel Inteligente com Importação Direta</p>
</div>

<div class="dashboard">
    <div class="card">
        <h2>📥 Entrada de Resultados</h2>
        <textarea id="inputResultados" placeholder="Cole aqui os milhares..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="processarResultados('rio')">Lançar Rio</button>
            <button onclick="processarResultados('look')" style="background: #7c3aed;">Lançar Look</button>
        </div>
    </div>

    <div class="card">
        <h2>📊 Ciclo Automático</h2>
        <div class="stats-grid">
            <div class="stat-box"> <span class="stat-val" id="fechados">0</span> Saíram </div>
            <div class="stat-box"> <span class="stat-val" id="faltam">25</span> Faltam </div>
        </div>
        <div class="badge-list" id="listaFaltantes"></div>
    </div>

    <div class="card">
        <h2>🏛️ Atrasados Rio</h2>
        <textarea id="inputAtrasadosRio" placeholder="Cole a lista de atrasados..."></textarea>
        <button class="btn-secondary" onclick="importarListaAtrasados('rio')">Importar Rio</button>
        <div class="badge-list" id="badgesRio"></div>
    </div>

    <div class="card">
        <h2>👁️ Atrasados Look</h2>
        <textarea id="inputAtrasadosLook" placeholder="Cole a lista de atrasados..."></textarea>
        <button class="btn-secondary" onclick="importarListaAtrasados('look')">Importar Look</button>
        <div class="badge-list" id="badgesLook"></div>
    </div>

    <div class="card">
        <h2>💡 Sugestão Estratégica</h2>
        <div id="painelSugestao"> <p>Aguardando dados...</p> </div>
        <div id="alertaGrave"></div>
    </div>

    <div class="card">
        <h2>🕒 Histórico e Backup</h2>
        <h3 style="font-size: 0.8rem;">Rio</h3>
        <div class="badge-list" id="historicoRio"></div>
        <h3 style="font-size: 0.8rem; margin-top:10px;">Look</h3>
        <div class="badge-list" id="historicoLook"></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
            <button class="btn-secondary" onclick="exportarBackup()">💾 Exportar (.txt)</button>
            
            <button class="btn-secondary" style="background:#0ea5e9" onclick="document.getElementById('fileInput').click()">📂 Importar (.txt)</button>
            <input type="file" id="fileInput" style="display:none" accept=".txt" onchange="lerArquivoBackup(event)">
        </div>
        <button class="btn-secondary" onclick="limparTudo()" style="background:#fff; color:#ef4444; border:1px solid #ef4444; margin-top:10px">⚠️ Limpar Tudo</button>
    </div>
</div>
