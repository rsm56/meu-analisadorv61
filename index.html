<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SABA v14.4 - FINAL</title>
    <style>
        :root { --blue: #1a73e8; --red: #d93025; --green: #188038; }
        body { font-family: -apple-system, sans-serif; background: #f1f3f4; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 12px; border-top: 6px solid var(--blue); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .toolbar { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-tool { cursor: pointer; border: 1px solid #dadce0; border-radius: 6px; padding: 10px; font-weight: bold; font-size: 10px; background: white; flex: 1; }
        .card { border: 1px solid #dadce0; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        h3 { color: var(--blue); margin: 0 0 8px 0; font-size: 12px; text-transform: uppercase; }
        textarea { width: 100%; height: 70px; border: 1px solid #bdc1c6; border-radius: 6px; padding: 8px; font-size: 14px; box-sizing: border-box; resize: none; margin-top: 5px; }
        .h-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .h-box { background: #f8f9fa; padding: 4px; border-radius: 4px; text-align: center; border: 1px solid #eee; }
        .h-box span { font-size: 9px; font-weight: bold; color: #5f6368; display: block; }
        input { width: 100%; padding: 8px; border: 1px solid #bdc1c6; border-radius: 6px; text-align: center; font-weight: bold; font-size: 16px; box-sizing: border-box; }
        .btn-exec { background: var(--blue); color: white; width: 100%; padding: 18px; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #1557b0; }
        .panel { background: #e8f5e9; border: 2px solid var(--green); padding: 10px; border-radius: 8px; margin-top: 15px; display: none; }
        .t-item { background: white; border: 1px solid var(--green); padding: 12px; border-radius: 6px; text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
    </style>
</head>
<body onload="carregarDB()">

<div class="container">
    <div class="toolbar">
        <button class="btn-tool" onclick="fazerBackup()">💾 EXPORTAR</button>
        <button class="btn-tool" onclick="document.getElementById('fIn').click()">📂 IMPORTAR</button>
        <input type="file" id="fIn" style="display:none" onchange="restaurarBackup(event)">
        <button class="btn-tool" style="color:var(--red)" onclick="resetarSistema()">🧨 ZERAR TUDO</button>
    </div>

    <div class="card">
        <h3>📊 CICLO & VICIADAS</h3>
        <textarea id="txtAt" placeholder="Cole Grupos Atrasados..."></textarea>
        <textarea id="txtVi" style="border-color:var(--blue)" placeholder="Cole Dezenas Viciadas..."></textarea>
    </div>

    <div class="card">
        <h3>🕒 RESULTADOS DO DIA</h3>
        <div class="h-grid">
            <div class="h-box"><span>COR</span><input type="number" id="h1"></div>
            <div class="h-box"><span>PPT</span><input type="number" id="h2"></div>
            <div class="h-box"><span>PTM</span><input type="number" id="h3"></div>
            <div class="h-box"><span>PT</span><input type="number" id="h4"></div>
            <div class="h-box"><span>PTV</span><input type="number" id="h5"></div>
            <div class="h-box"><span>PTN</span><input type="number" id="h6"></div>
        </div>
    </div>

    <button class="btn-exec" onclick="processarGeral()">GERAR JOGOS & LIMPAR TELA</button>

    <div id="painelPalpite" class="panel">
        <h3 id="txtStatus" style="color:var(--green); font-size:12px;">🎯 PALPITES GERADOS</h3>
        <div id="gridPalpites"></div>
    </div>
</div>

<script>
    let db = { ciclo: [], viciadas: [] };
    const KEY = "SABA_FINAL_V14_4";

    function carregarDB() {
        const data = localStorage.getItem(KEY);
        if(data) db = JSON.parse(data);
    }

    function getG(d) {
        let n = parseInt(d);
        return (n === 0 || n === 100) ? 25 : Math.ceil(n/4);
    }

    function aplicarEspelho(d) {
        let s = d.toString().padStart(2, '0');
        let n = parseInt(s.split('').reverse().join(''));
        return n > 99 ? Math.abs(n - 50) : n;
    }

    function processarGeral() {
        let rawAt = document.getElementById('txtAt').value;
        let rawVi = document.getElementById('txtVi').value;

        // 1. Captura e Atualiza Memória
        if(rawAt.trim() !== "") db.ciclo = [...new Set((rawAt.match(/\d+/g) || []).map(Number))];
        if(rawVi.trim() !== "") db.viciadas = [...new Set((rawVi.match(/\d+/g) || []).map(Number))];

        // 2. Processa h1-h6 e limpa imediatamente
        for(let i=1; i<=6; i++) {
            let el = document.getElementById('h'+i);
            let v = parseInt(el.value);
            if(!isNaN(v)) {
                db.ciclo = db.ciclo.filter(x => x !== v);
                db.ciclo.push(v);
            }
            el.value = ""; 
        }

        // 3. Persistência
        localStorage.setItem(KEY, JSON.stringify(db));

        if(db.viciadas.length < 3) {
            alert("Banco vazio. Insira as dezenas viciadas.");
            return;
        }

        // 4. Lógica de Geração
        let topo = db.ciclo.slice(0, 10);
        let lista = [...new Set([...db.viciadas.filter(d => topo.includes(getG(d))), ...db.viciadas])];
        
        let html = "";
        let tLista = [...lista];
        for(let j=0; j<4; j++) {
            if(tLista.length < 3) break;
            let jogo = [];
            let gps = [];
            while(jogo.length < 3 && tLista.length > 0) {
                let d = tLista.shift();
                let g = getG(d);
                if(jogo.includes(d) || gps.includes(g)) d = aplicarEspelho(d);
                jogo.push(d);
                gps.push(getG(d));
            }
            html += `<div class="t-item">JOGO ${j+1}: ${jogo.map(n=>n.toString().padStart(2,'0')).join(' - ')}</div>`;
        }

        // 5. Interface e Limpeza Final
        document.getElementById('painelPalpite').style.display = 'block';
        document.getElementById('gridPalpites').innerHTML = html;
        document.getElementById('txtAt').value = "";
        document.getElementById('txtVi').value = "";
        
        alert("Jogos Gerados e Campos Limpos!");
    }

    function fazerBackup() {
        const b = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = "SABA_BKP_V14.json";
        a.click();
    }

    function restaurarBackup(e) {
        const f = e.target.files[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                if(data.viciadas) {
                    db = data;
                    localStorage.setItem(KEY, JSON.stringify(db));
                    alert("✅ TUDO RESTAURADO!");
                    location.reload();
                }
            } catch(err) { alert("Arquivo inválido."); }
        };
        reader.readAsText(f);
    }

    function resetarSistema() {
        if(confirm("Isso apagará sua memória de dados. Confirmar?")) {
            localStorage.removeItem(KEY);
            location.reload();
        }
    }
</script>
</body>
</html>
